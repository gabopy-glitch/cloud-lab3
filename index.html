<!DOCTYPE html>
<html>
<head>
    <title>Gestión de Tareas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background: white; padding: 15px; border-radius: 8px;}
        input, button { margin: 5px 0; padding: 8px; }
        #resultado { margin-top: 15px; background-color: #f4f4f4; padding: 10px; border-radius: 5px; color: black; }
    </style>
</head>
<body>
    <h2 style="color: black;">Gestión de Tareas (Frontend)</h2>
    <input id="titulo" placeholder="Título">
    <input id="descripcion" placeholder="Descripción">
    <button onclick="crearTarea()">Crear Tarea</button>
    <button onclick="cargarTareas()">Cargar Tareas</button>
    <div id="resultado"></div>

    <script>
    // URL definitiva de tu API Serverless en Vercel
    const API_URL = "https://cloud-lab3-2ksm.vercel.app/api/tareas"; 

    async function crearTarea() {
        const tituloInput = document.getElementById('titulo').value;
        const descripcionInput = document.getElementById('descripcion').value;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    titulo: tituloInput,
                    descripcion: descripcionInput
                })
            });

            if (response.ok) {
                document.getElementById('titulo').value = '';
                document.getElementById('descripcion').value = '';
                cargarTareas();
            } else {
                alert("Error al crear la tarea.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Error de conexión con la API.");
        }
    }

    async function cargarTareas() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('resultado').innerHTML = '<p style="color:red;">Error al cargar. Revisa la consola.</p>';
        }
    }
</script>
</body>
</html>
